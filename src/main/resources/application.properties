spring.application.name=TioDaPerua

#http://localhost:8080/TioDaPerua/api
server.servlet.context-path=/${spring.application.name}/api/



#Conecao com o banco de dados
#spring.datasource.url=jdbc:postgresql://localhost:5432/TioDaPerua

# Usa o nome do servi�o do docker (db) se a vari�vel de ambiente existir,
# sen�o usa o localhost (seu PC)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/TioDaPerua}
spring.datasource.username=postgres
spring.datasource.password=sa
spring.jpa.hibernate.ddl-auto=update
